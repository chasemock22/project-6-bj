<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>18+ Portal Login</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background: #f4f4f4; }
        .login-card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        #msg { margin-top: 15px; font-size: 0.9rem; text-align: center; }
        .error { color: #dc3545; }
        .success { color: #28a745; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>Login</h2>
    <form id="loginForm">
        <input type="text" id="userName" placeholder="Full Name" required>
        <label for="birthDate">Date of Birth:</label>
        <input type="date" id="birthDate" required>
        <button type="submit">Enter</button>
    </form>
    <div id="msg"></div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const name = document.getElementById('userName').value.trim();
        const birthDate = new Array(document.getElementById('birthDate').value);
        const msg = document.getElementById('msg');

        if (name.length < 2) {
            msg.innerHTML = '<span class="error">Please enter a valid name.</span>';
            return;
        }

        const dob = new Date(birthDate);
        const today = new Date();
        let age = today.getFullYear() - dob.getFullYear();
        const monthDiff = today.getMonth() - dob.getMonth();
        
        if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < dob.getDate())) {
            age--;
        }

        if (age >= 18) {
            msg.innerHTML = `<span class="success">Welcome, ${name}! Access granted.</span>`;
        } else {
            msg.innerHTML = '<span class="error">Access denied. You must be at least 18.</span>';
        }
    });
</script>

</body>
</html>
