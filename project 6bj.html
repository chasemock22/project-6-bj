<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>18+ Portal Login</title>
     <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-card">
    <h2>Login</h2>
    <form id="loginForm">
        <input type="text" id="userName" placeholder="Full Name" required>
        <label for="birthDate">Date of Birth:</label>
        <input type="date" id="birthDate" required>
        <button type="submit">Enter</button>
    </form>
    <div id="msg"></div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const name = document.getElementById('userName').value.trim();
        const birthDate = new Array(document.getElementById('birthDate').value);
        const msg = document.getElementById('msg');

        if (name.length < 2) {
            msg.innerHTML = '<span class="error">Please enter a valid name.</span>';
            return;
        }

        const dob = new Date(birthDate);
        const today = new Date();
        let age = today.getFullYear() - dob.getFullYear();
        const monthDiff = today.getMonth() - dob.getMonth();
        
        if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < dob.getDate())) {
            age--;
        }

        if (age >= 18) {
            msg.innerHTML = `<span class="success">Access granted. Welcome, ${name}!</span>`;
        } else {
            msg.innerHTML = '<span class="error">Access denied. You must be at least 18.</span>';
        }
    });
</script>

</body>
</html>
